<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вело-Трекер Казань</title>
    <!-- Подключаем CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем Яндекс.Карты (замени YOUR_YANDEX_API_KEY на свой ключ) -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=49779049-bf30-4cf1-b80f-a5bb5ddff0ff&lang=ru_RU"></script>
    <!-- Подключаем библиотеку для скриншотов (для кнопки "Поделиться") -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>
    <!-- Главный экран -->
    <div id="app">
        <!-- Карта занимает весь фон -->
        <div id="map"></div>

        <!-- Верхняя панель: Скорость, Дистанция, Время, Одометр -->
        <div id="top-panel">
            <div class="stat-block">
                <span class="label" data-lang="speed">Скорость</span>
                <span id="speed-display">0.0</span><span class="unit">км/ч</span>
            </div>
            <div class="stat-block">
                <span class="label" data-lang="distance">Дистанция</span>
                <span id="distance-display">0.00</span><span class="unit">км</span>
            </div>
            <div class="stat-block">
                <span class="label" data-lang="time">Время</span>
                <span id="time-display">00:00</span>
            </div>
            <div class="stat-block total-odo">
                <span class="label" data-lang="total_km">Всего км</span>
                <span id="odo-display">0</span>
            </div>
        </div>

        <!-- Плавающая панель погоды (по клику обновляется) -->
        <div id="weather-panel" onclick="updateWeather()">
            <span id="weather-icon">☀️</span>
            <span id="weather-temp">--°C</span>
        </div>

        <!-- Нижняя панель управления -->
        <div id="bottom-panel">
            <button id="btn-start" class="main-btn neon-green" onclick="startRecording()">▶ Старт</button>
            <button id="btn-pause" class="main-btn yellow" onclick="togglePause()" style="display:none;">⏸ Пауза</button>
            <button id="btn-stop" class="main-btn red" onclick="stopRecording()" style="display:none;">⏹ Стоп</button>
            <button id="btn-manual" class="secondary-btn" onclick="enableManualDraw()">✏️ Рисовать</button>
            <button id="btn-save" class="secondary-btn" onclick="saveRoute()" style="display:none;">💾 Сохранить</button>
        </div>

        <!-- Кнопки меню (История и Настройки) -->
        <div id="menu-buttons">
            <button class="icon-btn" onclick="toggleSidebar('history')">📋</button>
            <button class="icon-btn" onclick="toggleSidebar('settings')">⚙️</button>
        </div>
    </div>

    <!-- Боковая панель "История" -->
    <div id="history-sidebar" class="sidebar hidden">
        <div class="sidebar-header">
            <h2 data-lang="history">История</h2>
            <button class="close-btn" onclick="toggleSidebar('history')">✖</button>
        </div>
        <div id="history-list"></div>
    </div>

    <!-- Боковая панель "Настройки" -->
    <div id="settings-sidebar" class="sidebar hidden">
        <div class="sidebar-header">
            <h2 data-lang="settings">Настройки</h2>
            <button class="close-btn" onclick="toggleSidebar('settings')">✖</button>
        </div>
        <div class="settings-content">
            <label data-lang="name">Имя</label>
            <input type="text" id="user-name" placeholder="Вася">

            <label data-lang="weight">Вес (кг)</label>
            <input type="number" id="user-weight" placeholder="70">

            <label data-lang="height">Рост (см)</label>
            <input type="number" id="user-height" placeholder="175">

            <label data-lang="theme">Тема</label>
            <select id="theme-select">
                <option value="dark">🌙 Тёмная</option>
                <option value="light">☀️ Светлая</option>
            </select>

            <label data-lang="language">Язык карты и интерфейса</label>
            <select id="lang-select">
                <option value="ru">Русский</option>
                <option value="en">English</option>
                <option value="ar">العربية</option>
            </select>

            <label data-lang="line_color">Цвет маршрута</label>
            <input type="color" id="route-color" value="#00ffcc">

            <button class="save-settings-btn" onclick="saveSettings()">💾 Сохранить настройки</button>
        </div>
    </div>

    <!-- Модальное окно итогов (выскакивает после остановки) -->
    <div id="finish-modal" class="modal hidden">
        <div class="modal-content">
            <h2 data-lang="ride_summary">Итоги поездки</h2>
            <div id="summary-data"></div>
            <div id="height-chart-container"><canvas id="height-chart"></canvas></div>
            <div class="modal-actions">
                <button onclick="shareScreenshot()">📸 Поделиться</button>
                <button onclick="closeModal()">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- Подключаем скрипты -->
    <script src="i18n.js"></script>
    <script src="app.js"></script>
</body>
</html>
